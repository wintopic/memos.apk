name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/android-apk.yml"
      - "android/**"
      - "mobile/**"
      - "scripts/android/**"
      - "store/db/sqlite/**"
      - "server/router/frontend/**"
      - "web/**"
      - "go.mod"
      - "go.sum"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.1"
  NODE_VERSION: "24"
  PNPM_VERSION: "10"
  JAVA_VERSION: "17"
  ANDROID_API_LEVEL: "35"
  ANDROID_BUILD_TOOLS: "35.0.0"
  ANDROID_NDK_VERSION: "27.2.12479018"
  ARTIFACT_RETENTION_DAYS: 30
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-debug-apk:
    name: Build Installable Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platforms;android-${{ env.ANDROID_API_LEVEL }}" \
            "build-tools;${{ env.ANDROID_BUILD_TOOLS }}" \
            "ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Make scripts executable
        run: chmod +x ./scripts/android/build-android-bindings.sh ./android/gradlew

      - name: Build frontend and Go mobile bindings
        run: |
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}"
          ./scripts/android/build-android-bindings.sh

      - name: Inspect generated Go bindings
        run: |
          set -euo pipefail
          ls -lah android/app/libs
          test -f android/app/libs/memosmobile.aar
          jar tf android/app/libs/memosmobile.aar | sed -n '1,160p'

      - name: Compile Android sources
        working-directory: android
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          log_file="ci-logs/compile-debug-kotlin.log"
          if ! ./gradlew --no-daemon --console=plain --stacktrace --info :app:compileDebugKotlin 2>&1 | tee "$log_file"; then
            summary="$(grep -E '^(e: |ERROR:|FAILURE:|\\* What went wrong:|Execution failed for task|Caused by:)' "$log_file" | tail -n 40 || true)"
            if [ -z "$summary" ]; then
              summary="$(tail -n 80 "$log_file")"
            fi
            summary="${summary//'%'/'%25'}"
            summary="${summary//$'\n'/'%0A'}"
            summary="${summary//$'\r'/'%0D'}"
            echo "::error title=Compile Android sources failed::$summary"
            exit 1
          fi

      - name: Process Android resources
        working-directory: android
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          log_file="ci-logs/process-debug-resources.log"
          if ! ./gradlew --no-daemon --console=plain --stacktrace --info :app:processDebugResources 2>&1 | tee "$log_file"; then
            summary="$(grep -E '^(e: |ERROR:|FAILURE:|\\* What went wrong:|Execution failed for task|Caused by:)' "$log_file" | tail -n 40 || true)"
            if [ -z "$summary" ]; then
              summary="$(tail -n 80 "$log_file")"
            fi
            summary="${summary//'%'/'%25'}"
            summary="${summary//$'\n'/'%0A'}"
            summary="${summary//$'\r'/'%0D'}"
            echo "::error title=Process Android resources failed::$summary"
            exit 1
          fi

      - name: Assemble Android debug APK
        working-directory: android
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          log_file="ci-logs/assemble-debug.log"
          if ! ./gradlew --no-daemon --console=plain --stacktrace --info :app:assembleDebug 2>&1 | tee "$log_file"; then
            summary="$(grep -E '^(e: |ERROR:|FAILURE:|\\* What went wrong:|Execution failed for task|Caused by:)' "$log_file" | tail -n 40 || true)"
            if [ -z "$summary" ]; then
              summary="$(tail -n 80 "$log_file")"
            fi
            summary="${summary//'%'/'%25'}"
            summary="${summary//$'\n'/'%0A'}"
            summary="${summary//$'\r'/'%0D'}"
            echo "::error title=Assemble Android debug APK failed::$summary"
            exit 1
          fi

      - name: Rename APK artifact
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/memos-android-debug.apk

      - name: Upload Android diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: memos-android-diagnostics
          path: |
            android/ci-logs
            android/app/build/reports
            android/build/reports
          if-no-files-found: warn
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Upload installable debug APK
        uses: actions/upload-artifact@v4
        with:
          name: memos-android-debug-apk
          path: artifacts/memos-android-debug.apk
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
